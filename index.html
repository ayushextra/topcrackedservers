<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Cracked Servers</title>

<style>
/* ===== Body & Background ===== */
body{
  margin:0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  justify-content:center;
  transition: background 0.5s, color 0.5s;
}

/* ===== Animated Background Squares ===== */
.square{
  position:absolute;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.05);
  animation: float 10s linear infinite;
}

@keyframes float{
  0% {transform: translateY(0) rotate(0deg);}
  100% {transform: translateY(-1000px) rotate(360deg);}
}

/* ===== Title ===== */
h1{
  font-size:50px;
  margin-bottom:50px;
  text-align:center;
  color:#22c55e;
  text-shadow: 0 0 15px rgba(34,197,94,0.7);
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  0% {text-shadow:0 0 10px rgba(34,197,94,0.5);}
  100% {text-shadow:0 0 25px rgba(34,197,94,1);}
}

/* ===== Buttons ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  z-index:1;
  position:relative;
}

.button{
  width:300px;
  padding:18px;
  font-size:22px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  transition:0.4s;
  font-weight:bold;
  color:white;
  text-align:center;
  background: linear-gradient(45deg,#22c55e,#16a34a);
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.button:hover{
  transform: scale(1.1);
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

.button.lifesteal{ background: linear-gradient(45deg,#ef4444,#b91c1c); }
.button.survival{ background: linear-gradient(45deg,#22c55e,#16a34a); }
.button.pvp{ background: linear-gradient(45deg,#3b82f6,#1e40af); }

/* ===== Settings Button ===== */
.settings{
  position: absolute;
  top:20px;
  right:20px;
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
  z-index:2;
}

.settings:hover{
  background:#334155;
}

.dropdown{
  display:none;
  position:absolute;
  top:50px;
  right:0;
  background:#1e293b;
  border-radius:10px;
  min-width:180px;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  flex-direction:column;
  z-index:100;
}

.dropdown a{
  color:white;
  text-decoration:none;
  padding:10px 15px;
  transition:0.3s;
}

.dropdown a:hover{
  background:#334155;
}

/* ===== Discord Icon ===== */
.discord{
  position: absolute;
  bottom:20px;
  right:20px;
  width:50px;
  cursor:pointer;
  transition:0.3s;
  z-index:2;
}

.discord:hover{
  transform: scale(1.2);
}

/* ===== Settings Option Inputs ===== */
input[type=range]{
  width:150px;
  margin:5px 10px;
}

</style>
</head>

<body>

<!-- Animated Squares Background -->
<script>
for(let i=0;i<50;i++){
  let sq=document.createElement('div');
  sq.className='square';
  sq.style.left=Math.random()*window.innerWidth+'px';
  sq.style.top=Math.random()*window.innerHeight+'px';
  sq.style.width=20+Math.random()*30+'px';
  sq.style.height=20+Math.random()*30+'px';
  sq.style.animationDuration=5+Math.random()*10+'s';
  document.body.appendChild(sq);
}
</script>

<h1>Minecraft Cracked Servers</h1>

<div class="container">
  <button class="button lifesteal" onclick="alert('Coming Soon 🚧')">
    ❤️ Lifesteal
  </button>
  <button class="button survival" onclick="window.location.href='survival.html'">
    🌲 Survival
  </button>
  <button class="button pvp" onclick="alert('Coming Soon 🚧')">
    ⚔️ PvP
  </button>
</div>

<!-- Settings Button -->
<div class="settings" onclick="toggleDropdown()">⚙️ Settings
  <div class="dropdown" id="settingsDropdown">
    <label style="padding:10px;color:white;display:block;">Theme:
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </label>
    <label style="padding:10px;color:white;display:block;">Text Size:
      <select id="textSizeSelect">
        <option value="small">Small</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Large</option>
      </select>
    </label>
  </div>
</div>

<!-- Discord Icon -->
<a href="https://discord.gg/8gTQUH3V7Y" target="_blank">
  <img class="discord" src="https://upload.wikimedia.org/wikipedia/commons/9/98/Discord_logo.svg" alt="Discord">
</a>

<script>
// Dropdown toggle
function toggleDropdown(){
  const dropdown = document.getElementById('settingsDropdown');
  dropdown.style.display = (dropdown.style.display==='flex')?'none':'flex';
}

// Close dropdown if clicked outside
window.onclick=function(event){
  const dropdown = document.getElementById('settingsDropdown');
  const settingsBtn = document.querySelector('.settings');
  if(!settingsBtn.contains(event.target)){
    dropdown.style.display='none';
  }
}

// Theme and Text Size Change
document.getElementById('themeSelect').addEventListener('change', function(){
  if(this.value==='light'){
    document.body.style.background='linear-gradient(135deg,#f0f0f0,#c0c0c0)';
    document.body.style.color='black';
  } else{
    document.body.style.background='linear-gradient(135deg,#0f172a,#020617)';
    document.body.style.color='white';
  }
});

document.getElementById('textSizeSelect').addEventListener('change', function(){
  const sizeMap={'small':'30px','medium':'50px','large':'70px'};
  document.querySelector('h1').style.fontSize=sizeMap[this.value];
});
</script>

</body>
</html>
