<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Survival Servers — Best Minecraft Cracked</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--grass:#4CAF50;--grass2:#6FCF3F;--grass-dark:#2d6a2f;--gold:#FFD700;--gold-dark:#5a4500;--bg:#111;--card:#1c1c1c;--border:#2a2a2a;--text:#e8e8e8;--muted:#888;--accent:#27ae60;--accent2:#6FCF3F;--accent-dark:#0a1f0a;--px:'Press Start 2P',monospace;--vt:'VT323',monospace;--body:'Outfit',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--body);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(255,255,255,.018) 32px),repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(255,255,255,.018) 32px);background-size:32px 32px;}
nav{position:sticky;top:0;z-index:999;background:rgba(10,10,10,.97);border-bottom:3px solid var(--accent-dark);backdrop-filter:blur(10px);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px;}
.nav-logo{font-family:var(--px);font-size:9px;color:var(--accent2);text-shadow:2px 2px 0 var(--accent-dark);text-decoration:none;line-height:1.8;flex-shrink:0;}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-links a{font-family:var(--px);font-size:7px;padding:7px 10px;border:2px solid transparent;border-radius:2px;text-decoration:none;color:var(--muted);transition:all .15s;}
.nav-links a:hover,.nav-links a.active{color:var(--accent2);border-color:var(--accent);background:rgba(39,174,96,.1);}
.hero{position:relative;text-align:center;padding:60px 20px 48px;background:linear-gradient(180deg,#071407 0%,#0a1e0a 55%,var(--bg) 100%);overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:8px;background:repeating-linear-gradient(90deg,var(--accent) 0,var(--accent) 16px,var(--accent2) 16px,var(--accent2) 32px,var(--accent-dark) 32px,var(--accent-dark) 48px);}
.hero-icon{font-size:48px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(39,174,96,.5));}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero h1{font-family:var(--px);font-size:clamp(12px,2.4vw,18px);color:var(--accent2);text-shadow:4px 4px 0 var(--accent-dark);margin-bottom:10px;line-height:1.8;}
.hero p{font-family:var(--vt);font-size:20px;color:var(--muted);}
main{max-width:1100px;margin:0 auto;padding:44px 20px 80px;position:relative;z-index:1;}
.sec-title{font-family:var(--px);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;display:flex;align-items:center;gap:12px;}
.sec-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--border),transparent);}
.server-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
.srv-card{background:var(--card);border:2px solid var(--border);border-radius:4px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeUp .5s ease both;}
.srv-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 28px rgba(39,174,96,.15);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.top-bar{height:4px;background:var(--accent);}
.top-bar.gold{background:linear-gradient(90deg,var(--gold-dark),var(--gold),#fff8c0,var(--gold),var(--gold-dark));background-size:200% 100%;animation:shimmer 2.5s linear infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.srv-head{padding:14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.srv-logo{width:52px;height:52px;border-radius:4px;border:2px solid #333;background:#222;font-size:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.srv-logo img{width:100%;height:100%;object-fit:cover;}
.srv-info{flex:1;min-width:0;}
.srv-name{font-family:var(--px);font-size:9px;color:#fff;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srv-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-family:var(--px);font-size:5px;padding:2px 6px;border-radius:1px;border:1px solid;}
.tag.survival{color:var(--accent2);border-color:var(--accent);background:rgba(39,174,96,.1);}
.tag.cracked{color:var(--gold);border-color:var(--gold);background:rgba(255,215,0,.08);}
.tag.bedrock{color:#5bc8ff;border-color:#3a8aaa;background:rgba(91,200,255,.08);}
.tag.java{color:#a0f080;border-color:#407020;background:rgba(100,200,50,.08);}
.tag.both{color:#d080ff;border-color:#604080;background:rgba(180,100,255,.08);}
.tag.featured{color:var(--gold);border-color:var(--gold-dark);background:rgba(255,215,0,.12);}
.srv-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.srv-dot.on{background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:blink 2s ease-in-out infinite;}
.srv-dot.off{background:#e74c3c;}
.srv-dot.checking{background:var(--gold);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.srv-body{padding:14px;}
.srv-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px;}
.srv-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.meta{background:#161616;border:1px solid var(--border);border-radius:2px;padding:8px 10px;}
.meta-l{font-family:var(--px);font-size:5px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
.meta-v{font-family:var(--vt);font-size:18px;}
.meta-v.green{color:var(--accent2);}.meta-v.red{color:#e74c3c;}.meta-v.gold{color:var(--gold);}
.meta-v.ip{font-size:14px;color:var(--accent2);}
.srv-foot{padding:10px 14px;background:#161616;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.copy-btn{font-family:var(--px);font-size:6px;padding:8px 12px;background:var(--accent-dark);color:var(--accent2);border:2px solid var(--accent);border-radius:2px;cursor:pointer;transition:all .15s;}
.copy-btn:hover{background:var(--accent);color:#000;}
.copy-btn.copied{background:var(--gold);color:#000;border-color:var(--gold);}
.copy-btn.gold-btn{background:var(--gold-dark);color:var(--gold);border-color:var(--gold);}
.copy-btn.gold-btn:hover{background:var(--gold);color:#000;}
.pbar-wrap{flex:1;}
.pbar-top{display:flex;justify-content:space-between;font-family:var(--px);font-size:5px;color:var(--muted);margin-bottom:3px;}
.pbar{height:5px;background:#2a2a2a;border-radius:1px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:1px;transition:width .8s ease;}
.pbar-fill.green{background:linear-gradient(90deg,var(--accent-dark),var(--accent2));}
.pbar-fill.gold{background:linear-gradient(90deg,var(--gold-dark),var(--gold));}
.pbar-fill.offline{background:#e74c3c;}
footer{text-align:center;padding:28px 20px;border-top:4px solid;border-image:repeating-linear-gradient(90deg,var(--accent) 0,var(--accent) 16px,var(--accent2) 16px,var(--accent2) 32px,var(--accent-dark) 32px,var(--accent-dark) 48px) 1;font-family:var(--px);font-size:7px;color:var(--muted);}
footer a{color:var(--accent2);text-decoration:none;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent-dark);border:2px solid var(--accent);color:var(--accent2);font-family:var(--px);font-size:8px;padding:12px 24px;border-radius:3px;z-index:99999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:600px){.server-grid{grid-template-columns:1fr;}.nav-links a{font-size:6px;padding:5px 7px;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Best Minecraft<br/><span>Cracked Servers</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="lifesteal.html">Lifesteal</a>
    <a href="pvp.html">PvP</a>
    <a href="survival.html" class="active">Survival</a>
  </div>
</nav>
<div class="hero">
  <span class="hero-icon">🌲</span>
  <h1>Survival Servers</h1>
  <p>Build, explore and survive — no premium needed!</p>
</div>
<main>
  <div class="sec-title">🌲 Survival Servers</div>
  <div class="server-grid" id="server-grid"></div>
</main>
<footer>
  &copy; 2025 Best Minecraft Cracked Servers &nbsp;|&nbsp;
  <a href="index.html">Home</a> &nbsp;|&nbsp;
  <a href="lifesteal.html">Lifesteal</a> &nbsp;|&nbsp;
  <a href="pvp.html">PvP</a>
</footer>
<div class="toast" id="toast"></div>
<script>
const SERVERS = [
  {name:'CrownMC',logo:'👑',ip:'CrownMc.Net',port:'19132',platform:'Bedrock',featured:true,desc:'The most popular cracked Bedrock survival server. No premium account required — join with any username and start playing instantly!'},
  // Add more survival servers here:
  // {name:'My Server',logo:'🌲',ip:'play.server.net',port:'19132',platform:'Bedrock',featured:false,desc:'Description...'},
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function platClass(p){if(!p)return 'bedrock';const l=p.toLowerCase();if(l.includes('java')&&l.includes('bedrock'))return 'both';if(l.includes('java'))return 'java';return 'bedrock';}

function renderServers(){
  const grid=document.getElementById('server-grid');
  grid.innerHTML=SERVERS.map((s,i)=>{
    const logo=s.logo&&s.logo.startsWith('http')?`<img src="${s.logo}" alt=""/>`:s.logo||'🌲';
    return `<div class="srv-card" style="animation-delay:${i*0.1}s">
      <div class="top-bar ${s.featured?'gold':''}"></div>
      <div class="srv-head">
        <div class="srv-logo">${logo}</div>
        <div class="srv-info">
          <div class="srv-name">${esc(s.name)}</div>
          <div class="srv-tags">
            ${s.featured?'<span class="tag featured">★ Featured</span>':''}
            <span class="tag survival">🌲 Survival</span>
            <span class="tag cracked">Cracked</span>
            <span class="tag ${platClass(s.platform)}">${esc(s.platform)}</span>
          </div>
        </div>
        <div class="srv-dot checking" id="dot-${i}"></div>
      </div>
      <div class="srv-body">
        <p class="srv-desc">${esc(s.desc)}</p>
        <div class="srv-meta">
          <div class="meta"><div class="meta-l">Server IP</div><div class="meta-v ip">${esc(s.ip)}</div></div>
          <div class="meta"><div class="meta-l">Port</div><div class="meta-v ${s.featured?'gold':''}">${esc(s.port||'Default')}</div></div>
          <div class="meta"><div class="meta-l">Platform</div><div class="meta-v" style="font-size:14px">${esc(s.platform)}</div></div>
          <div class="meta"><div class="meta-l">Players Online</div><div class="meta-v green" id="pl-${i}">Checking...</div></div>
        </div>
      </div>
      <div class="srv-foot">
        <button class="copy-btn ${s.featured?'gold-btn':''}" onclick="copyIP(this,'${esc(s.ip)}')">${s.featured?'👑 ':''}Copy IP</button>
        <div class="pbar-wrap">
          <div class="pbar-top"><span>Capacity</span><span id="cap-${i}">—</span></div>
          <div class="pbar"><div class="pbar-fill ${s.featured?'gold':'green'}" id="pb-${i}" style="width:0%"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
  SERVERS.forEach((s,i)=>pingServer(s,i));
}

async function pingServer(s,i){
  const dot=document.getElementById('dot-'+i),plEl=document.getElementById('pl-'+i),capEl=document.getElementById('cap-'+i),pbEl=document.getElementById('pb-'+i);
  if(!dot)return;
  const isBedrock=s.platform&&s.platform.toLowerCase().includes('bedrock');
  const url=isBedrock?`https://api.mcsrvstat.us/bedrock/3/${s.ip}`:`https://api.mcsrvstat.us/3/${s.ip}`;
  try{
    const data=await(await fetch(url)).json();
    if(data.online){
      dot.className='srv-dot on';
      const on=data.players?.online??'?',mx=data.players?.max??'?';
      if(plEl)plEl.textContent=on+' / '+mx;
      if(typeof on==='number'&&typeof mx==='number'&&mx>0){const pct=Math.min(100,Math.round(on/mx*100));if(capEl)capEl.textContent=pct+'%';if(pbEl)pbEl.style.width=pct+'%';}
    }else{
      dot.className='srv-dot off';
      if(plEl){plEl.textContent='Offline';plEl.className='meta-v red';}
      if(capEl)capEl.textContent='0%';if(pbEl){pbEl.style.width='0%';pbEl.className='pbar-fill offline';}
    }
  }catch(e){if(dot)dot.className='srv-dot off';if(plEl)plEl.textContent='N/A';}
}
setInterval(()=>SERVERS.forEach((s,i)=>pingServer(s,i)),60000);
function copyIP(btn,ip){navigator.clipboard.writeText(ip).then(()=>{const o=btn.innerHTML;btn.textContent='✔ Copied!';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('copied');},2000);});}
renderServers();
</script>
</body>
</html>
